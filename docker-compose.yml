services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    environment:
      - WATCHPACK_POLLING=true
      - DATABASE_URL=mysql://meshitomo:Meshi_t0m0!@db:3306/meshitomo
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: Root_passw0rd!
      MYSQL_DATABASE: meshitomo
      MYSQL_USER: meshitomo
      MYSQL_PASSWORD: Meshi_t0m0!
      TZ: Asia/Tokyo
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin:latest
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_USER: meshitomo
      PMA_PASSWORD: Meshi_t0m0!
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
